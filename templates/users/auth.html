{% extends 'users/base.html' %}
{% load static %}

{% block title %}Domi Sushi — Кіру / Тіркелу{% endblock %}

{% block content %}
<style>
  .auth-container {
    background: rgba(17,17,17,0.94);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(212,175,55,0.3);
    border-radius: 20px;
    padding: 45px 40px;
    width: 100%;
    max-width: 480px;
    margin: 60px auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.7), 0 0 40px rgba(212,175,55,0.18);
    text-align: center;
  }

  .auth-container h1 { font-family: 'Playfair Display', serif; font-size: 3.2rem; color: #d4af37; margin-bottom: 8px; letter-spacing: 1.5px; }
  .auth-container h2 { font-size: 1.6rem; color: #ccc; margin: 0 0 35px; font-weight: 400; }

  .auth-tabs { display: flex; margin-bottom: 35px; border-bottom: 1px solid #333; }
  .tab-btn { flex: 1; background: transparent; border: none; color: #aaa; font-size: 1.15rem; padding: 14px; cursor: pointer; transition: all 0.3s; position: relative; }
  .tab-btn.active { color: #d4af37; font-weight: 600; }
  .tab-btn.active::after { content: ''; position: absolute; bottom: -1px; left: 0; width: 100%; height: 3px; background: #d4af37; }

  .auth-form { display: flex; flex-direction: column; gap: 22px; }
  .input-group { text-align: left; }
  .input-group label { display: block; margin-bottom: 8px; color: #ddd; font-weight: 500; }
  .input-group input { width: 100%; padding: 14px 16px; border: 1px solid #444; border-radius: 10px; background: #1a1a1a; color: #fff; font-size: 1rem; transition: all 0.3s; }
  .input-group input:focus { outline: none; border-color: #d4af37; box-shadow: 0 0 12px rgba(212,175,55,0.3); }

  .auth-form button { background: #d4af37; color: #000; border: none; padding: 15px; font-size: 1.1rem; font-weight: 600; border-radius: 10px; cursor: pointer; transition: all 0.3s; }
  .auth-form button:hover { background: #b58e2a; transform: translateY(-2px); box-shadow: 0 10px 25px rgba(212,175,55,0.3); }

  .switch-text { margin-top: 20px; color: #aaa; font-size: 0.95rem; }
  .switch-text span { color: #d4af37; cursor: pointer; font-weight: 500; }
  .switch-text span:hover { text-decoration: underline; }

  .password-wrapper { position: relative; display: flex; flex-direction: column; }
  .show-password { display: flex; align-items: center; gap: 8px; cursor: pointer; color: #bbb; font-size: 0.95rem; margin-top: 8px; }
  .show-password input[type="checkbox"] { accent-color: #d4af37; width: 18px; height: 18px; cursor: pointer; }

  .gen-btn { background: #444; color: #fff; border: none; padding: 14px 20px; border-radius: 10px; cursor: pointer; font-size: 0.95rem; margin-top: 10px; transition: all 0.3s; }
  .gen-btn:hover { background: #666; }

  @media (max-width: 480px) {
    .auth-container { padding: 35px 25px; }
    .auth-container h1 { font-size: 2.5rem; }
  }
</style>

<div class="auth-page">
  <div class="auth-container">
    <h1>Domi Sushi</h1>
    <h2>Кіру немесе тіркелу</h2>

    <div class="auth-tabs">
      <button type="button" class="tab-btn active" onclick="showTab(0)">Кіру</button>
      <button type="button" class="tab-btn" onclick="showTab(1)">Тіркелу</button>
    </div>

    <!-- Форма Кіру -->
    <div id="login-form" class="auth-form" style="display:block;">
      <form method="POST">
        {% csrf_token %}
        <input type="hidden" name="action" value="login">
        
        <div class="input-group">
          <label for="login-username">Логин</label>
          <input type="text" id="login-username" name="username" placeholder="Логин немесе email" required>
        </div>

        <div class="input-group">
          <label for="login-password">Құпия сөз</label>
          <input type="password" id="login-password" name="password" placeholder="Құпия сөзіңіз" required>
        </div>

        <button type="submit">Кіру</button>
      </form>

      <p class="switch-text">Аккаунтыңыз жоқ па? <span onclick="showTab(1)">Тіркеліңіз</span></p>
    </div>

    <!-- Форма Тіркелу -->
    <div id="register-form" class="auth-form" style="display:none;">
      <form method="POST">
        {% csrf_token %}
        <input type="hidden" name="action" value="register">
        
        <div class="input-group">
          <label for="reg-username">Логин</label>
          <input type="text" id="reg-username" name="username" placeholder="Логин немесе email" required>
        </div>

        <div class="input-group">
          <label for="reg-email">Email</label>
          <input type="email" id="reg-email" name="email" placeholder="Email адресі" required>
        </div>

        <div class="input-group">
          <label for="reg-password">Құпия сөз</label>
          <div class="password-wrapper">
            <input type="password" id="reg-password" name="password" placeholder="Құпия сөз" required>
            <label class="show-password">
              <input type="checkbox" id="show-password-checkbox">
              <span>Көрсету</span>
            </label>
          </div>
        </div>

        <button type="button" class="gen-btn" onclick="generatePassword()">Генерациялау</button>

        <button type="submit">Тіркелу</button>
      </form>

      <p class="switch-text">Аккаунтыңыз бар ма? <span onclick="showTab(0)">Кіріңіз</span></p>
    </div>
  </div>
</div>

<script>
  function showTab(tab) {
    document.getElementById('login-form').style.display = tab === 0 ? 'block' : 'none';
    document.getElementById('register-form').style.display = tab === 1 ? 'block' : 'none';
    
    document.querySelectorAll('.tab-btn').forEach((btn, i) => {
      btn.classList.toggle('active', i === tab);
    });
  }

  function generatePassword() {
    const length = 12;
    const charset = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+";
    let password = "";
    for (let i = 0; i < length; i++) {
      password += charset.charAt(Math.floor(Math.random() * charset.length));
    }
    document.getElementById('reg-password').value = password;
  }

  document.getElementById('show-password-checkbox').addEventListener('change', function() {
    const input = document.getElementById('reg-password');
    input.type = this.checked ? 'text' : 'password';
  });
</script>
{% endblock %}
